services:
  api:
    container_name: fire-control-api-test-api
    build:
      context: ../../
      dockerfile: deploy/containers/fastapi/Dockerfile
      args:
        - TEST=TRUE
    networks:
      - fire-control-api
    volumes:
      - ../../source/api:/api
      - ../../source/tests:/api/tests
    env_file:
      - ../variables/test
    command: >
      uv run --no-sync pytest
      --cov=api
      --cov-report=term-missing
      --cov-report=markdown:/api/tests/tests_coverage.md
      /api/tests/

  postgres:
    container_name: fire-control-api-test-postgres
    build:
      context: ../containers/postgres
      dockerfile: Dockerfile
    volumes:
      - ../containers/postgres/init-test.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres:/var/lib/postgresql
    env_file:
      - ../variables/test
    networks:
      - fire-control-api

  redis:
    container_name: fire-control-api-test-redis
    build:
      context: ../containers/redis
      dockerfile: Dockerfile
    volumes:
      - redis:/data
    networks:
      - fire-control-api

  minio:
    container_name: fire-control-api-test-minio
    restart: unless-stopped
    build:
      context: ../containers/minio
      dockerfile: Dockerfile
    volumes:
      - minio:/data
    networks:
      - fire-control-api
    env_file:
      - ../variables/test
    command: server /data --console-address ":9001"

volumes:
  postgres:
    name: fire-control-api-test-postgres
  redis:
    name: fire-control-api-test-redis
  minio:
    name: fire-control-api-test-minio

networks:
  fire-control-api:
    name: fire-control-api-test-network
    driver: bridge
